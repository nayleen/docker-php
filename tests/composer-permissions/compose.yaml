services:
  composer:
    image: ${REGISTRY:-ghcr.io/nayleen}/php:${PHP_VERSION:-8.5}
    user: "${HOST_UID:-1000}:0"
    command: ["bash", "-c", "composer install --quiet --no-interaction --no-progress && rm -r vendor/"]
    volumes:
      - $PWD:/app/src
      - ${COMPOSER_CACHE_DIR:-/tmp/composer}:/app/var/composer
