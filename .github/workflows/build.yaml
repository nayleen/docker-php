name: Build Image

on:
  workflow_call:
    inputs:
      php-version:
        default: ''
        required: false
        type: string
  workflow_dispatch:
    inputs:
      php-version:
        default: ''
        required: false
        type: string
        description: 'PHP version to build (all if omitted)'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.php-version || 'all' }}
  cancel-in-progress: false

permissions: {}

jobs:
  php-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.php-versions.outputs.versions }}
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Resolve PHP Versions
        id: php-versions
        env:
          PHP_VERSION: ${{ inputs.php-version }}
        run: |
          if [ -n "$PHP_VERSION" ]; then
            ./tools/resolve-php-image.sh "$PHP_VERSION" > /dev/null
            VERSIONS=$(jq --compact-output --null-input --arg version "$PHP_VERSION" '[$version]')
          else
            VERSIONS=$(jq --exit-status --compact-output 'keys | select(length > 0)' php-images.json)
          fi

          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  build:
    needs: php-versions
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        php: ${{ fromJSON(needs.php-versions.outputs.versions) }}
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Login to Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: nayleen
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Resolve PHP Image
        id: php-image
        env:
          PHP_VERSION: ${{ matrix.php }}
        run: |
          PHP_IMAGE=$(./tools/resolve-php-image.sh "$PHP_VERSION")
          echo "image=$PHP_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: "PHP_IMAGE=${{ steps.php-image.outputs.image }}"
          cache-from: type=registry,ref=ghcr.io/nayleen/php:${{ matrix.php }}-${{ matrix.arch }}-cache
          cache-to: type=registry,ref=ghcr.io/nayleen/php:${{ matrix.php }}-${{ matrix.arch }}-cache,mode=max
          context: .
          push: true
          tags: ghcr.io/nayleen/php:${{ matrix.php }}-${{ matrix.arch }}

  combine-manifests:
    needs:
      - php-versions
      - build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(needs.php-versions.outputs.versions) }}
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: nayleen
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine Manifests
        env:
          PHP_VERSION: ${{ matrix.php }}
        run: |
          docker buildx imagetools create -t "ghcr.io/nayleen/php:${PHP_VERSION}" \
            "ghcr.io/nayleen/php:${PHP_VERSION}-amd64" \
            "ghcr.io/nayleen/php:${PHP_VERSION}-arm64"
