name: Continuous Integration

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - rootfs/**
      - tools/**
      - .dockerignore
      - Dockerfile
      - php-images.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  php-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.php-versions.outputs.versions }}
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Resolve PHP Versions
        id: php-versions
        run: |
          VERSIONS=$(jq --exit-status --compact-output 'keys | select(length > 0)' php-images.json)
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  test:
    needs: php-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(needs.php-versions.outputs.versions) }}
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Resolve PHP Image
        id: php-image
        env:
          PHP_VERSION: ${{ matrix.php }}
        run: |
          PHP_IMAGE=$(./tools/resolve-php-image.sh "$PHP_VERSION")
          echo "image=$PHP_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Local Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          build-args: "PHP_IMAGE=${{ steps.php-image.outputs.image }}"
          cache-from: type=registry,ref=ghcr.io/nayleen/php:${{ matrix.php }}-amd64-cache
          context: .
          load: true
          push: false
          tags: "ghcr.io/nayleen/php:${{ matrix.php }}"

      - name: Test Local Images
        env:
          PHP_VERSION: ${{ matrix.php }}
        run: |
          # assume each subfolder of ./tests is a test suite and run it
          for test in ./tests/*/; do
            (cd "$test" && ./run.sh)
          done

  ci-result:
    name: CI result
    if: ${{ always() }}
    needs:
      - php-versions
      - test
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify Required Jobs
        env:
          PHP_VERSIONS_RESULT: ${{ needs.php-versions.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          test "$PHP_VERSIONS_RESULT" = success
          test "$TEST_RESULT" = success

  release:
    if: ${{ github.event_name == 'push' }}
    needs: ci-result
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build.yaml
